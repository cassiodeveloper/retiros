<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Nie znaleziono strony</title>
</head>
<body>
  <script>
    const path = window.location.pathname;

    if (path.startsWith("/retreat/")) {
      const id = path.split("/retreat/")[1];
      window.location.href = `/retreat.html?id=${encodeURIComponent(id)}`;
    } else {
      window.location.href = "/index.html";
    }
  </script>
</body>
</html>
